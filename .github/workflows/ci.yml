name: CI

on:
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Validate hook scripts
        run: |
          for f in hooks/*.sh; do
            echo "Checking $f..."
            bash -n "$f" || exit 1
          done
          echo "All hooks pass syntax check"

      - name: Validate TOML
        run: python3 -c "import tomllib; tomllib.load(open('scripts/exemplars.toml', 'rb')); print('TOML valid')"

      - name: Validate prompt file exists
        run: test -f prompts/stop.txt

      - name: Validate plugin manifest
        run: python3 -c "import json; d=json.load(open('.claude-plugin/plugin.json')); assert d['name']; assert d['version']; print(f'Plugin: {d[\"name\"]} v{d[\"version\"]}')"
