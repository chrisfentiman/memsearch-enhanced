# Semantic classifier exemplars for memsearch-enhanced.
#
# These examples train the classifier to decide whether a user's prompt
# needs project context injected. Update based on observed misclassifications.
#
# Location priority:
#   1. .memsearch-enhanced.toml (project-level)
#   2. ~/.config/memsearch-enhanced/exemplars.toml (global)
#   3. This file (plugin default)

[needs_context]
# Prompts that NEED project-specific context (code, memories, decisions)
examples = [
    # Direct code/project references
    "fix the bug in the authentication module",
    "refactor the database connection layer",
    "what does the config parser do",
    "update the API endpoint for user registration",
    "why is the test failing in CI",
    "add error handling to the payment flow",
    "how does the caching layer work",
    "where is the error handling code",
    "review the recent changes to auth",
    "what architecture decisions did we make",
    # Implicit project references
    "continue where we left off",
    "what were we working on yesterday",
    "why did we switch from REST to GraphQL",
    "what was the decision about the database",
    "how did we handle the auth migration",
    "what corrections did the user make",
    "what blockers did we find",
    "what did the research say about this",
    # History/memory references
    "what did we decide about the config format",
    "do you remember the issue with the mocks",
]

[no_context]
# Prompts that DON'T need project context
examples = [
    # General knowledge
    "what is a Python decorator",
    "explain how HTTP works",
    "write a hello world program",
    "what's the difference between TCP and UDP",
    "how do I install numpy",
    "explain git branching",
    "what is REST",
    # Hard negatives (sound project-ish but generic)
    "how do I write unit tests",
    "what's the best way to handle errors in Python",
    "how to set up CI/CD",
    "explain dependency injection",
    "best practices for database migrations",
    "how does docker compose work",
    "what is semantic versioning",
    # Short/casual
    "hello",
    "thanks",
    "yes",
    "no",
    "looks good",
    "ok",
    "got it",
]
